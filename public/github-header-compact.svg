<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Linky README Header Compact</title>
  <desc id="desc">Compact monochrome Linky header with slash mark and product wordmark.</desc>

  <!-- Compact outer frame for a clean, editorial GitHub presentation. -->
  <rect width="1600" height="420" fill="white" />
  <rect x="20" y="20" width="1560" height="380" stroke="black" stroke-width="2" fill="none" />

  <!-- Canonical slash logo mark, matching favicon and app icon direction. -->
  <line x1="180" y1="310" x2="272" y2="106" stroke="black" stroke-width="54" stroke-linecap="square" />

  <!-- Primary project lockup. -->
  <text x="356" y="215" fill="black" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="116" font-weight="700" letter-spacing="-2">
    Linky
  </text>
  <text x="360" y="262" fill="black" font-family="IBM Plex Mono, Menlo, Monaco, monospace" font-size="24" font-weight="500" letter-spacing="0.8">
    one short link for many tabs
  </text>
  <text x="360" y="302" fill="black" font-family="IBM Plex Mono, Menlo, Monaco, monospace" font-size="20" font-weight="400" letter-spacing="0.5">
    skill / api / cli / sdk
  </text>

  <!-- Production domain badge reinforces deployed-product credibility. -->
  <rect x="1148" y="56" width="380" height="56" stroke="black" stroke-width="2" fill="none" />
  <text x="1170" y="92" fill="black" font-family="IBM Plex Mono, Menlo, Monaco, monospace" font-size="24" font-weight="500">
    getalinky.com
  </text>

  <!-- Subtle baseline for visual rhythm. -->
  <line x1="360" y1="332" x2="1266" y2="332" stroke="black" stroke-width="2" />
</svg>
