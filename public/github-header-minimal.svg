<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Linky README Header Minimal</title>
  <desc id="desc">Ultra-minimal monochrome Linky header with slash mark and domain only.</desc>

  <!-- Minimal composition: high contrast, lots of whitespace, strict geometry. -->
  <rect width="1600" height="420" fill="white" />
  <rect x="20" y="20" width="1560" height="380" stroke="black" stroke-width="2" fill="none" />

  <!-- Hero slash logo mark as the single brand symbol. -->
  <line x1="702" y1="316" x2="816" y2="94" stroke="black" stroke-width="62" stroke-linecap="square" />

  <!-- Domain-only lockup for the most minimal identity treatment. -->
  <text x="560" y="360" fill="black" font-family="IBM Plex Mono, Menlo, Monaco, monospace" font-size="34" font-weight="500" letter-spacing="0.8">
    getalinky.com
  </text>
</svg>
